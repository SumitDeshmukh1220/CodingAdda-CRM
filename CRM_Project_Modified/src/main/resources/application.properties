spring.application.name=CRM_Project
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp
server.port=8081


spring.datasource.url=jdbc:mysql://localhost:3306/crmdb_springboot
spring.datasource.username=root
spring.datasource.password=Shiva@001

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/static/**

# Run data.sql on every startup to seed courses (safe – uses INSERT ... WHERE NOT EXISTS)
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
